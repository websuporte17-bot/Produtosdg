<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nelson Games V24 - Sistema Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root { --mario-blue: #5c94fc; --mario-red: #e52521; --mario-yellow: #f8d800; --bg-color: #f4f5f7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; overflow-x: hidden; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .header-bg { background-color: var(--mario-blue); padding: 25px 0; text-align: center; }
        .header-title { color: white; text-shadow: 2px 2px 0 #000; font-size: 14px; margin-bottom: 15px; }
        .hero-image { width: 100%; max-width: 300px; margin: 0 auto; display: block; }
        .mario-ground { height: 16px; background: repeating-linear-gradient(45deg, #d35400, #d35400 10px, #e67e22 10px, #e67e22 20px); border-top: 4px solid #000; border-bottom: 4px solid #000; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .product-card { background: white; border-radius: 15px; padding: 10px; border: 2px solid #eee; transition: 0.2s; }
        .img-container { width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: #f9f9f9; border: 1px solid #f0f0f0; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--mario-blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px; border-radius: 50%; z-index: 100; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto; color: white; }
        .input-admin { background: #222; border: 1px solid #444; border-radius: 8px; padding: 12px; width: 100%; margin-bottom: 10px; color: white; }
    </style>
</head>
<body>

    <header class="header-bg">
        <h1 class="retro-font header-title">NELSON<br>GAMES</h1>
        <img src="https://github.com/user-attachments/assets/d158e9a0-58c0-40df-9212-737aeb0f16f9" class="hero-image">
    </header>
    <div class="mario-ground"></div>

    <div class="p-4 overflow-x-auto flex space-x-2 hide-scroll" id="navCats"></div>

    <div id="loading" class="flex flex-col items-center py-20">
        <div class="loader"></div>
        <p class="mt-4 retro-font text-[8px]">LOCALIZANDO ITENS...</p>
    </div>

    <main class="products-grid hidden" id="grid"></main>

    <div class="admin-btn" onclick="toggleAdmin()"><i class="ph-fill ph-robot text-2xl"></i></div>

    <div id="adminModal">
        <div class="flex justify-between items-center mb-6">
            <h2 class="retro-font text-sm">NOVO PRODUTO</h2>
            <button onclick="toggleAdmin()" class="text-2xl">&times;</button>
        </div>
        <input type="text" id="pName" placeholder="Nome do Jogo" class="input-admin">
        <input type="text" id="pPrice" placeholder="Preço (ex: 50.00)" class="input-admin">
        <input type="text" id="pCat" placeholder="Categoria" class="input-admin">
        <textarea id="pDesc" placeholder="Descrição" class="input-admin" rows="3"></textarea>
        <p class="text-[10px] mb-2 text-gray-400">IMAGENS:</p>
        <input type="file" id="pFiles" multiple accept="image/*" class="mb-4 text-xs">
        <button id="btnPub" onclick="publishNow()" class="w-full bg-green-600 py-4 rounded-xl font-bold retro-font text-[10px]">PUBLICAR NO GITHUB</button>
    </div>

    <script>
        // ==========================================
        // API CONFIGURADA PARA: InfinityFree / Lovestoblog
        // ==========================================
        const API_URL = "https://dgapi.lovestoblog.com/phpbb/api.php"; 

        let allProducts = [];
        let activeFilter = 'Tudo';

        async function loadProducts() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Erro no PHP");
                const data = await res.json();
                allProducts = Array.isArray(data) ? data : [];
                renderStore();
                renderMenu();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('grid').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 retro-font text-[8px] text-center">ERRO DE CONEXÃO</p>';
            }
        }

        function renderStore() {
            const container = document.getElementById('grid');
            const filtered = activeFilter === 'Tudo' ? allProducts : allProducts.filter(p => p.category.toUpperCase() === activeFilter.toUpperCase());
            container.innerHTML = filtered.length ? '' : '<p class="col-span-2 text-center py-10 opacity-50">Vazio</p>';
            filtered.forEach(p => {
                const img = (p.media && p.media.length > 0) ? p.media[0].url : '';
                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container"><img src="${img}" onerror="this.src='https://placehold.co/300?text=Sem+Foto'"></div>
                        <div class="mt-2">
                            <p class="text-[8px] text-blue-500 font-bold uppercase">${p.category}</p>
                            <h3 class="text-[10px] font-bold uppercase truncate">${p.name}</h3>
                            <p class="text-green-600 font-black">R$ ${parseFloat(p.price).toFixed(2)}</p>
                        </div>
                    </div>`;
            });
        }

        function renderMenu() {
            const cats = ['Tudo', ...new Set(allProducts.map(p => p.category.toUpperCase()))];
            const nav = document.getElementById('navCats');
            nav.innerHTML = '';
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full text-[9px] retro-font whitespace-nowrap ${activeFilter.toUpperCase() === c ? 'bg-red-600 text-white' : 'bg-white border'}`;
                btn.innerText = c;
                btn.onclick = () => { activeFilter = c; renderStore(); renderMenu(); };
                nav.appendChild(btn);
            });
        }

        function toggleAdmin() {
            const modal = document.getElementById('adminModal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        async function publishNow() {
            const btn = document.getElementById('btnPub');
            const fileInput = document.getElementById('pFiles');
            if(!fileInput.files.length) return alert("Selecione uma foto!");
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const filePromises = Array.from(fileInput.files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
            });

            const base64Files = await Promise.all(filePromises);
            const payload = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                category: document.getElementById('pCat').value,
                description: document.getElementById('pDesc').value,
                files: base64Files
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(result.status === "sucesso") { alert("SUCESSO!"); location.reload(); }
                else { alert("ERRO: " + result.message); }
            } catch (e) { alert("ERRO NO PHP"); }
            finally { btn.innerText = "PUBLICAR NO GITHUB"; btn.disabled = false; }
        }
        window.onload = loadProducts;
    </script>
</body>
</html>
